apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "cardano-node.fullname" . }}
  labels:
    {{- include "cardano-node.commonLabels" . | nindent 4 }}
    component: cardano-node
spec:
  replicas: 1
  serviceName: {{ include "cardano-node.headlessName" . }}
  selector:
    matchLabels:
      {{- include "cardano-node.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cardano-node.selectorLabels" . | nindent 8 }}
        {{- include "cardano-node.commonLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60

      {{- if .Values.global.mithril.enabled }}
      initContainers:
        - name: mithril-download
          image: {{ .Values.global.mithrilImage | default (printf "cardanofoundation/cardano-rosetta-java-mithril:%s" .Values.global.mithrilVersion) | quote }}
          command:
            - sh
            - -c
            - |
              if [ -d /node/db ] && [ "$(ls -A /node/db 2>/dev/null)" ]; then
                echo "Node DB already exists ($(du -sh /node/db 2>/dev/null | cut -f1)), skipping Mithril download"
                exit 0
              fi
              echo "No existing node DB found, starting Mithril download..."
              exec /sbin/entrypoint.sh
          env:
            - name: NETWORK
              value: {{ .Values.global.network | quote }}
            - name: MITHRIL_SYNC
              value: {{ .Values.global.mithril.sync | toString | quote }}
            - name: SNAPSHOT_DIGEST
              value: {{ .Values.global.mithril.snapshotDigest | quote }}
            - name: AGGREGATOR_ENDPOINT
              value: {{ .Values.global.mithril.aggregatorEndpoint | quote }}
            - name: GENESIS_VERIFICATION_KEY
              value: {{ .Values.global.mithril.genesisVerificationKey | quote }}
            - name: ANCILLARY_VERIFICATION_KEY
              value: {{ .Values.global.mithril.ancillaryVerificationKey | quote }}
          volumeMounts:
            - name: node-data
              mountPath: /node
          resources:
            {{- $profile := (include "cardano-node.profile" .) }}
            {{- $res := index .Values.global.profiles $profile "resources" "mithril" }}
            {{- toYaml $res | nindent 12 }}
      {{- end }}

      containers:
        - name: cardano-node
          image: {{ .Values.global.cardanoNodeImage | default (printf "cardanofoundation/cardano-rosetta-java-cardano-node:%s" .Values.global.cardanoNodeVersion) | quote }}
          command: ["/sbin/entrypoint.sh", "cardano-node"]
          env:
            - name: CARDANO_NODE_SOCKET_PATH
              value: /node/node.socket
            - name: CARDANO_NODE_PORT
              value: "3001"
            - name: CARDANO_NODE_DB
              value: /node/db
            - name: CARDANO_CONFIG_CONTAINER_PATH
              value: /config/{{ .Values.global.network }}
            - name: NETWORK
              value: {{ .Values.global.network | quote }}
            - name: PROTOCOL_MAGIC
              value: {{ .Values.global.protocolMagic | toString | quote }}
          ports:
            - name: node-to-node
              containerPort: 3001
              protocol: TCP
            - name: metrics
              containerPort: 12798
              protocol: TCP
          volumeMounts:
            - name: node-data
              mountPath: /node
          resources:
            {{- $profile := (include "cardano-node.profile" .) }}
            {{- $res := index .Values.global.profiles $profile "resources" "cardanoNode" }}
            {{- toYaml $res | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - |
                  if [ "$NETWORK" = "mainnet" ]; then
                    TIP=$(cardano-cli query tip --mainnet)
                  else
                    TIP=$(cardano-cli query tip --testnet-magic ${PROTOCOL_MAGIC})
                  fi
                  PROGRESS=$(echo "$TIP" | grep -o '"syncProgress": *"[^"]*"' | grep -o '[0-9.]*')
                  awk -v p="$PROGRESS" 'BEGIN { exit (p+0 >= 99.9) ? 0 : 1 }'
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 30
            timeoutSeconds: 10
          startupProbe:
            exec:
              command:
                - test
                - -S
                - /node/node.socket
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: {{ (((.Values.node).startupProbe).failureThreshold) | default 1920 }}
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - |
                  if [ "$NETWORK" = "mainnet" ]; then
                    TIP=$(cardano-cli query tip --mainnet)
                  else
                    TIP=$(cardano-cli query tip --testnet-magic ${PROTOCOL_MAGIC})
                  fi
                  PROGRESS=$(echo "$TIP" | grep -o '"syncProgress": *"[^"]*"' | grep -o '[0-9.]*')
                  awk -v p="$PROGRESS" 'BEGIN { exit (p+0 >= 99.9) ? 0 : 1 }'
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 14400
            timeoutSeconds: 10

        - name: socat
          image: alpine/socat:1.7.4.4-r0
          command:
            - sh
            - -c
            - |
              echo "Waiting for cardano-node socket at /node/node.socket..."
              until [ -S /node/node.socket ]; do
                echo "Socket not yet available, waiting 5s..."
                sleep 5
              done
              echo "Socket found, starting socat bridge TCP:3002 -> UNIX:/node/node.socket"
              exec socat \
                TCP-LISTEN:3002,reuseaddr,fork \
                UNIX-CONNECT:/node/node.socket,retry=5,interval=1
          ports:
            - name: socat-n2c
              containerPort: 3002
              protocol: TCP
          volumeMounts:
            - name: node-data
              mountPath: /node
          startupProbe:
            exec:
              command:
                - test
                - -S
                - /node/node.socket
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: {{ (((.Values.node).startupProbe).failureThreshold) | default 1920 }}
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.global.initContainerResources | nindent 12 }}

        - name: cardano-submit-api
          image: {{ .Values.global.cardanoNodeImage | default (printf "cardanofoundation/cardano-rosetta-java-cardano-node:%s" .Values.global.cardanoNodeVersion) | quote }}
          command: ["/sbin/entrypoint.sh", "cardano-submit-api"]
          env:
            - name: NETWORK
              value: {{ .Values.global.network | quote }}
            - name: PROTOCOL_MAGIC
              value: {{ .Values.global.protocolMagic | toString | quote }}
            - name: CARDANO_NODE_SOCKET_PATH
              value: /node/node.socket
            - name: NODE_SUBMIT_API_PORT
              value: "8090"
          ports:
            - name: submit-api
              containerPort: 8090
              protocol: TCP
          volumeMounts:
            - name: node-data
              mountPath: /node
          resources:
            {{- $profile := (include "cardano-node.profile" .) }}
            {{- $res := index .Values.global.profiles $profile "resources" "submitApi" }}
            {{- toYaml $res | nindent 12 }}
          startupProbe:
            exec:
              command:
                - test
                - -S
                - /node/node.socket
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: {{ (((.Values.node).startupProbe).failureThreshold) | default 1920 }}
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 10

  volumeClaimTemplates:
    - metadata:
        name: node-data
        labels:
          {{- include "cardano-node.commonLabels" . | nindent 10 }}
          component: cardano-node
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.global.storage.cardanoNode.storageClass }}
        storageClassName: {{ .Values.global.storage.cardanoNode.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.global.storage.cardanoNode.size }}
